services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: quickards
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: quickards
    volumes:
      - quickards_pgdata:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quickards"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_USER: quickards
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: quickards
      BOT_TOKEN: ${BOT_TOKEN}
      CORS_ORIGINS: ${CORS_ORIGINS:-https://quickards.flurai.ru}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:8001:8001"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8001/api/health').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://quickards.flurai.ru}
    restart: always
    ports:
      - "127.0.0.1:8002:80"

volumes:
  quickards_pgdata:
